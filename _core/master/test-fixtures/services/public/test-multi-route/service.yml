name: test-multi-route
display_name: Test Multi Route
version: "1.0.0"
description: Test service with combined routing (auto_subdomain + domain + subfolder)
type: docker-compose
visibility: public
routing:
  - type: auto_subdomain
    base_domain: apps.example.com
    internal_port: 80
    container_name: test-multi-route
    strip_prefix: false
  - type: domain
    domain: multi-route.example.com
    internal_port: 80
    container_name: test-multi-route
    strip_prefix: true
  - type: subfolder
    base_domain: apps.example.com
    path: /multi-route
    internal_port: 80
    container_name: test-multi-route
    strip_prefix: false
health:
  enabled: true
  endpoint: /health
  interval: 30s
  timeout: 10s
  retries: 3
backup:
  enabled: false
tags:
  - test
  - multi-route