services:
  master:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILD_ENV=prod
    container_name: platform-master
    restart: unless-stopped
    ports:
      - "8001:8000"
    user: "0:0"
    # Важно: задаём критичные переменные через интерполяцию с дефолтами.
    # Это защищает от `null` при запуске без `export` и без локального `.env`.
    environment:
      - SERVICES_PATH=${SERVICES_PATH:-/services}
      - CADDY_CONFIG_PATH=${CADDY_CONFIG_PATH:-/caddy}
      - BACKUP_PATH=${BACKUP_PATH:-/backups}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./master.db}
      - AUTH_PROVIDER=${AUTH_PROVIDER:-builtin}
      - APP_ENV=${APP_ENV:-prod}
      - PLATFORM_DOMAIN=${PLATFORM_DOMAIN:-localhost}
      - KEYCLOAK_SERVER_URL=${KEYCLOAK_SERVER_URL:-http://keycloak:8080/auth}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-platform}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-master-service}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_IDS=${TELEGRAM_CHAT_IDS:-[]}
    volumes:
      - ./master.db:/app/master.db
      - ../../services:/services
      - ../../_core/caddy:/caddy
      - ../../backups/backups:/backups
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - platform

networks:
  platform:
    external: true
    name: platform_network
