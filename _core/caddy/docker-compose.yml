services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Важно: задаём критичные переменные через интерполяцию с дефолтами.
    # Это защищает от `null` при запуске без `export` и без локального `.env`.
    environment:
      - APP_ENV=${APP_ENV:-prod}
      - PLATFORM_DOMAIN=${PLATFORM_DOMAIN:-localhost}
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
      - "127.0.0.1:2019:2019"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./conf.d:/etc/caddy/conf.d:ro
      - ./snippets:/etc/caddy/snippets:ro
      - ./sites:/srv:ro
      - ./data:/data
      - ./config:/config
      - ./logs:/var/log/caddy
    networks:
      - platform

networks:
  platform:
    external: true
    name: platform_network
