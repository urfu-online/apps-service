version: '3.8'

services:
  kopia:
    image: kopia/kopia:latest
    container_name: kopia
    restart: unless-stopped
    volumes:
      - ../../services:/services:ro
      - /data/kopia:/repository
      - ./config:/kopia
    environment:
      - KOPIA_REPOSITORY=${KOPIA_REPOSITORY:-/repository}
      - KOPIA_REPOSITORY_PASSWORD=${KOPIA_REPOSITORY_PASSWORD}
      - KOPIA_STORAGE_TYPE=${KOPIA_STORAGE_TYPE:-filesystem}
      - KOPIA_SERVER_USERNAME=${KOPIA_SERVER_USERNAME:-admin}
      - KOPIA_SERVER_PASSWORD_FILE=${KOPIA_SERVER_PASSWORD_FILE:-/kopia/server.pass}
    ports:
      - "51515:51515"
    entrypoint: /kopia/entrypoint.sh
    command: []
    healthcheck:
      test: ["CMD", "kopia", "--config-file=/kopia/repository.config", "repository", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - apps-service-net

networks:
  apps-service-net:
    external: true
    name: apps-service-net