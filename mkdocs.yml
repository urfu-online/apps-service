site_name: apps-service
site_description: Управление сервисами на Docker через манифесты
site_url: https://urfu-online.github.io/apps-service
repo_url: https://github.com/urfu-online/apps-service
repo_name: urfu-online/apps-service

theme:
  name: material
  language: ru
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

  icon:
    repo: fontawesome/brands/github

  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - def_list
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - https://cdn.jsdelivr.net/gh/rod2ik/cdn@main/mkdocs/css/massilia-mermaid.css


nav:
  - index.md
  - Начало работы:
      - getting-started/install.md
      - getting-started/first-service.md
      - getting-started/cli-ui.md
  - Пользователь:
      - user-guide/services.md
      - user-guide/backup.md
      - user-guide/monitoring.md
  - Разработчикам:
      - development/index.md
      - development/workflow.md
      - development/documentation.md
      - development/master-service.md
      - development/testing.md
      - development/caddy-configuration.md
      - development/deployment-runbook.md
      - development/upgrade-to-release.md
      - development/release-process.md
      - development/guides-wishlist.md
  - Справочник:
      - architecture.md
      - api.md
      - examples.md
      - best-practices.md
      - reference/service-yml.md
      - TROUBLESHOOTING.md

plugins:
  - search:
      lang:
        - ru
        - en

  - mermaid2:
      arguments:
        theme: 'base'
        themeVariables:
          primaryColor: '#2d3436'
          primaryTextColor: '#ffffff'
          primaryBorderColor: '#0984e3'
          lineColor: '#dfe6e9'

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/urfu-online/apps-service
