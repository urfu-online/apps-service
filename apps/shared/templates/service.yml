# apps/shared/templates/service.yml

# === МЕТАДАННЫЕ ===
name: my-service
display_name: "Мой Сервис"
version: "1.0.0"
description: "Краткое описание сервиса"
maintainer: "team@example.com"
repository: "https://github.com/org/my-service"
tags:
  - web
  - production

# === ТИП СЕРВИСА ===
type: docker-compose  # docker-compose | docker | static | external

# === ВИДИМОСТЬ ===
visibility: public    # public | internal

# === МАРШРУТИЗАЦИЯ ===
routing:
  # Вариант 1: Отдельный домен
  - type: domain
    domain: myservice.example.com
    
  # Вариант 2: Подпапка
  - type: subfolder
    base_domain: apps.example.com
    path: /my-service
    strip_prefix: true  # убирать prefix при проксировании
    
  # Вариант 3: Порт (внутренний/тестовый)
  - type: port
    port: 8081
    
  # Внутренний порт контейнера (куда проксировать)
  internal_port: 8000
  
  # Дополнительные заголовки
  headers:
    X-Service-Name: my-service

# === HEALTH CHECK ===
health:
  enabled: true
  endpoint: /health
  interval: 30s
  timeout: 10s
  retries: 3

# === РЕСУРСЫ ===
resources:
  memory_limit: 512M
  cpu_limit: 0.5

# === БЭКАПЫ ===
backup:
  enabled: true
  schedule: "0 2 * * *"  # Каждый день в 2:00
  retention: 7           # Хранить 7 дней
  paths:
    - ./data
    - ./uploads
  databases:
    - type: postgres
      container: db
      database: myservice

# === ЛОГИРОВАНИЕ ===
logging:
  driver: loki
  labels:
    - service
    - level

# === ЗАВИСИМОСТИ ===
dependencies:
  services:
    - postgres
    - redis
  external:
    - keycloak

# === ПЕРЕМЕННЫЕ ОКРУЖЕНИЯ (дефолты) ===
environment:
  LOG_LEVEL: info
  
# === СЕКРЕТЫ (ссылки) ===
secrets:
  - DATABASE_URL
  - API_KEY
  
# === ХУКИ ===
hooks:
  post_deploy:
    - "./scripts/migrate.sh"
  pre_backup:
    - "./scripts/prepare-backup.sh"

# === УВЕДОМЛЕНИЯ ===
notifications:
  telegram: true
  events:
    - deploy
    - error
    - health_fail